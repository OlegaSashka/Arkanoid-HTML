<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkanoid</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-root">
        <div class="game-header">
            <h2>Очки: <span id="game-score">0</span></h2>
            <h2>Рекорд: <span id="game-highScore">0</span></h2>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="game-footer">
            <h2>Жизни: <span id="game-lives">3</span></h2>
            <h2>Уровень: <span id="game-level">1</span></h2>
            <h2>Рекорд уровня: <span id="game-highLevel">1</span></h2>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script type="module" src="js\main.js"></script>
</body>
</html>
